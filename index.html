<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ПрофиСфера — витрина (прототип)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =================================================================
   КОНФИГУРАЦИЯ — единственное, что нужно поменять под себя:
   адрес твоего PIM (без слэша в конце). Менять в <script> ниже,
   константа API_BASE.
   ================================================================= */
:root{
  --bg:#F4F8F9; --surface:#ffffff; --ink:#0E2A31; --muted:#5B7780;
  --primary:#0E9AA0; --primary-deep:#0A6E73; --line:#DCE8EA; --mint:#E7F4F3;
  --warn:#B4541F;
  --shadow:0 1px 2px rgba(14,42,49,.04), 0 10px 30px rgba(14,42,49,.07);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Inter",system-ui,sans-serif; font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
h1,h2,h3{font-family:"Space Grotesk",sans-serif;margin:0;letter-spacing:-.01em}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
.topbar::before{content:"";display:block;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--primary-deep))}
.topbar-inner{max-width:1200px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .logo{font-family:"Space Grotesk";font-weight:700;font-size:22px;letter-spacing:-.02em}
.brand .logo b{color:var(--primary)}
.brand .tag{font-size:12px;color:var(--muted)}
.pim-badge{margin-left:auto;display:inline-flex;align-items:center;gap:7px;
  font-size:12px;color:var(--primary-deep);background:var(--mint);
  border:1px solid #CDE9E7;border-radius:999px;padding:5px 11px;white-space:nowrap}
.pim-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);
  box-shadow:0 0 0 0 rgba(14,154,160,.5);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(14,154,160,.45)}70%{box-shadow:0 0 0 7px rgba(14,154,160,0)}100%{box-shadow:0 0 0 0 rgba(14,154,160,0)}}

/* ---- audience pills ---- */
.audiences{max-width:1200px;margin:0 auto;padding:16px 20px 0;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);font-weight:600;margin-right:4px}
.pill{border:1px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:999px;padding:8px 16px;font-size:14px;font-weight:500;
  transition:transform .12s ease,border-color .12s,background .12s}
.pill:hover{border-color:var(--primary)}
.pill[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill .ic{margin-right:6px;opacity:.8}

/* ---- direction chips ---- */
.directions{max-width:1200px;margin:0 auto;padding:12px 20px 0;
  display:flex;gap:7px;flex-wrap:wrap;min-height:0}
.chip{border:1px dashed #C6D8DA;background:transparent;color:var(--primary-deep);
  border-radius:999px;padding:6px 13px;font-size:13px;transition:all .12s}
.chip:hover{border-style:solid;border-color:var(--primary)}
.chip[aria-pressed="true"]{background:var(--mint);border-style:solid;border-color:var(--primary);font-weight:600}

/* ---- layout ---- */
.shell{max-width:1200px;margin:0 auto;padding:22px 20px 60px;
  display:grid;grid-template-columns:248px 1fr;gap:28px}
.sidebar h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.tree{list-style:none;margin:0;padding:0;font-size:14px}
.tree li{margin:1px 0}
.tree button{width:100%;text-align:left;border:0;background:transparent;color:var(--ink);
  padding:7px 10px;border-radius:9px;font-size:14px;transition:background .12s}
.tree button:hover{background:#fff}
.tree button[aria-pressed="true"]{background:var(--ink);color:#fff;font-weight:600}
.tree .sub{padding-left:12px;border-left:1px solid var(--line);margin-left:10px}
.tree .reset{color:var(--muted)}

.main-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.main-head h1{font-size:26px}
.count{font-size:13px;color:var(--muted)}
.count b{color:var(--ink)}

/* ---- product grid ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;text-align:left;padding:0;display:flex;flex-direction:column;
  transition:transform .14s ease,box-shadow .14s ease,border-color .14s;animation:rise .4s ease both}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#C8DEDF}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card .ph{aspect-ratio:4/3;background:var(--mint);display:flex;align-items:center;justify-content:center;overflow:hidden}
.card .ph img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply}
.card .ph .noimg{color:#9BBDBE;font-size:13px}
.card .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
.card .kr{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--primary-deep);font-weight:600}
.card .nm{font-family:"Space Grotesk";font-weight:600;font-size:15.5px;line-height:1.25}
.card .ds{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .facets{margin-top:auto;display:flex;flex-wrap:wrap;gap:5px;padding-top:8px}
.tagx{font-size:11px;background:#F0F5F6;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--muted)}

/* ---- states ---- */
.state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.state h3{font-size:18px;color:var(--ink);margin-bottom:8px}
.state code{font-family:"IBM Plex Mono";background:#fff;border:1px solid var(--line);padding:2px 6px;border-radius:6px;font-size:12px}
.skel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);height:280px;overflow:hidden;position:relative}
.skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(14,42,49,.04),transparent);transform:translateX(-100%);animation:sh 1.3s infinite}
@keyframes sh{to{transform:translateX(100%)}}
.more{display:block;margin:30px auto 0;border:1px solid var(--line);background:#fff;color:var(--ink);
  border-radius:999px;padding:11px 24px;font-weight:600;font-size:14px}
.more:hover{border-color:var(--primary)}

/* ---- drawer ---- */
.scrim{position:fixed;inset:0;background:rgba(14,42,49,.34);opacity:0;visibility:hidden;transition:opacity .2s;z-index:40}
.scrim.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,100%);background:var(--bg);
  z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.7,.2,1);
  overflow-y:auto;box-shadow:-20px 0 50px rgba(14,42,49,.18)}
.drawer.open{transform:translateX(0)}
.dr-head{position:sticky;top:0;background:var(--bg);padding:18px 22px 12px;border-bottom:1px solid var(--line);z-index:2}
.dr-close{float:right;border:1px solid var(--line);background:#fff;border-radius:9px;width:34px;height:34px;font-size:18px;line-height:1}
.dr-body{padding:6px 22px 50px}
.dr-gallery{display:flex;flex-direction:column;gap:10px;margin:14px 0 6px}
.dr-main{aspect-ratio:4/3;background:#fff;border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.dr-main img{max-width:100%;max-height:100%;object-fit:contain}
.dr-thumbs{display:flex;gap:8px;flex-wrap:wrap}
.dr-thumbs img{width:56px;height:56px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.dr-thumbs img:hover{border-color:var(--primary)}
.kr2{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--primary-deep);font-weight:600}
.dr-title{font-size:23px;margin:3px 0 8px}
.dr-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tag2{font-size:12px;background:var(--mint);border:1px solid #CDE9E7;color:var(--primary-deep);border-radius:7px;padding:3px 9px}
.tag2.aud{background:var(--ink);color:#fff;border-color:var(--ink)}
.section{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-top:14px}
.section h3{font-size:13px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.dl{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;font-size:14px}
.dl dt{color:var(--muted)}
.dl dd{margin:0;text-align:right}
.spec{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.spec:last-child{border-bottom:0}
.spec .k{color:var(--muted)}
.spec .v{font-weight:500;text-align:right}
.rich{font-size:14.5px;line-height:1.6}
.rich img{max-width:100%}
.docs a{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px;text-decoration:none;color:var(--primary-deep)}
.docs a:last-child{border-bottom:0}
/* variant switcher */
.variants .grp{margin-bottom:12px}
.variants .glabel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.variants .vrow{display:flex;flex-wrap:wrap;gap:7px}
.vbtn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;text-align:left}
.vbtn:hover{border-color:var(--primary)}
.vbtn[aria-current="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

@media (max-width:820px){
  .shell{grid-template-columns:1fr;gap:18px}
  .sidebar{order:2}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="logo">Профи<b>Сфера</b></span>
      <span class="tag">стоматология · витрина-прототип</span>
    </div>
    <span class="pim-badge"><span class="dot"></span>данные из PIM в реальном времени</span>
  </div>
  <div class="audiences" id="audiences"></div>
  <div class="directions" id="directions"></div>
  <div style="height:14px"></div>
</header>

<div class="shell">
  <aside class="sidebar">
    <h2>Категории</h2>
    <ul class="tree" id="tree"></ul>
  </aside>

  <main>
    <div class="main-head">
      <h1 id="heading">Каталог</h1>
      <div class="count" id="count"></div>
    </div>
    <div class="grid" id="grid"></div>
    <button class="more" id="more" style="display:none">Показать ещё</button>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<script>
/* ============================================================
   👇 ЕДИНСТВЕННАЯ НАСТРОЙКА: адрес твоего PIM без слэша в конце.
   Напр.: "https://pim.tvoy-domen.ru"
   Локально для проверки: "http://127.0.0.1:8000"
   (для чужого домена нужен CORS на стороне PIM — см. сообщение Claude.)
   ============================================================ */
const API_BASE = "https://profisfera-pim.ru";

const api = (p) => API_BASE.replace(/\/$/,"") + p;
const state = { audience:null, direction:null, category:null, menu:[], next:null };

const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c)=>{const e=document.createElement(t); if(c) e.className=c; return e;};
function flag(code){ if(!code||code.length!==2) return ""; return code.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0))); }
function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }

async function fetchJSON(url){
  const r = await fetch(url, { headers:{ "Accept":"application/json" }});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

/* ---------- навигация: аудитории + направления ---------- */
async function loadMenu(){
  state.menu = await fetchJSON(api("/api/audiences/menu/"));
  renderAudiences(); renderDirections();
}
function renderAudiences(){
  const box = $("#audiences"); box.innerHTML="";
  const eb = el("span","eyebrow"); eb.textContent="Для кого"; box.appendChild(eb);
  box.appendChild(pill("Все аудитории", state.audience===null, ()=>{ state.audience=null; state.direction=null; onFilter(); }));
  state.menu.forEach(a=>{
    box.appendChild(pill((a.icon? a.icon+" ":"")+a.name, state.audience===a.slug, ()=>{
      state.audience = a.slug; state.direction=null; onFilter();
    }));
  });
}
function pill(label, active, on){
  const b=el("button","pill"); b.innerHTML=esc(label); b.setAttribute("aria-pressed", active);
  b.onclick=on; return b;
}
function renderDirections(){
  const box=$("#directions"); box.innerHTML="";
  const aud = state.menu.find(a=>a.slug===state.audience);
  if(!aud || !aud.directions.length) return;
  box.appendChild(chip("Все направления", state.direction===null, ()=>{ state.direction=null; onFilter(); }));
  aud.directions.forEach(d=>{
    box.appendChild(chip(d.name, state.direction===d.slug, ()=>{ state.direction=d.slug; onFilter(); }));
  });
}
function chip(label, active, on){
  const b=el("button","chip"); b.textContent=label; b.setAttribute("aria-pressed",active); b.onclick=on; return b;
}

/* ---------- категории (дерево-хребет) ---------- */
async function loadTree(){
  const roots = await fetchJSON(api("/api/categories/tree/"));
  const ul=$("#tree"); ul.innerHTML="";
  const all=el("li"); all.appendChild(treeBtn({name:"Все категории",id:null}, true));
  ul.appendChild(all);
  roots.forEach(c=>ul.appendChild(treeNode(c)));
}
function treeNode(cat){
  const li=el("li"); li.appendChild(treeBtn(cat,false));
  if(cat.children && cat.children.length){
    const sub=el("ul","sub"); cat.children.forEach(ch=>sub.appendChild(treeNode(ch))); li.appendChild(sub);
  }
  return li;
}
function treeBtn(cat, isReset){
  const b=el("button", isReset?"reset":""); b.textContent=cat.name;
  b.setAttribute("aria-pressed", state.category===cat.id);
  b.onclick=()=>{ state.category=cat.id; onFilter(); };
  return b;
}

/* ---------- товары ---------- */
function onFilter(){
  renderAudiences(); renderDirections(); refreshTreePressed();
  $("#heading").textContent = headingText();
  loadProducts(true);
}
function refreshTreePressed(){
  $("#tree").querySelectorAll("button").forEach(b=>{ /* перерисуем дерево проще: */ });
  loadTree(); // дерево лёгкое — перерисуем, чтобы подсветить активную ветку
}
function headingText(){
  const a=state.menu.find(x=>x.slug===state.audience);
  const d=a && a.directions.find(x=>x.slug===state.direction);
  if(d) return a.name+" · "+d.name;
  if(a) return a.name;
  return "Каталог";
}
function queryString(){
  const q=new URLSearchParams();
  if(state.audience) q.set("audience", state.audience);
  if(state.direction) q.set("direction", state.direction);
  if(state.category) q.set("category", state.category);
  return q.toString();
}
async function loadProducts(reset){
  const grid=$("#grid");
  if(reset){ grid.innerHTML=""; for(let i=0;i<6;i++){const s=el("div","skel");grid.appendChild(s);} $("#more").style.display="none"; }
  try{
    const url = reset ? api("/api/products/?"+queryString()) : state.next;
    const data = await fetchJSON(url);
    const items = data.results || data;
    state.next = data.next || null;
    if(reset){ grid.innerHTML=""; $("#count").innerHTML = (data.count!=null? "<b>"+data.count+"</b> товаров" : ""); }
    if(reset && items.length===0){ grid.appendChild(emptyState()); return; }
    items.forEach(p=>grid.appendChild(card(p)));
    $("#more").style.display = state.next ? "block" : "none";
  }catch(e){
    grid.innerHTML=""; grid.appendChild(errorState(e));
  }
}
function card(p){
  const c=el("button","card"); c.onclick=()=>openProduct(p.slug);
  const ph=el("div","ph");
  if(p.thumbnail){ const im=el("img"); im.src=p.thumbnail; im.alt=p.name; im.loading="lazy"; ph.appendChild(im); }
  else { const n=el("div","noimg"); n.textContent="без фото"; ph.appendChild(n); }
  c.appendChild(ph);
  const b=el("div","body");
  if(p.brand){ const kr=el("div","kr"); kr.textContent=p.brand; b.appendChild(kr); }
  const nm=el("div","nm"); nm.textContent=p.name; b.appendChild(nm);
  if(p.short_description){ const ds=el("div","ds"); ds.textContent=p.short_description; b.appendChild(ds); }
  const f=el("div","facets");
  (p.directions||[]).slice(0,3).forEach(s=>{ const t=el("span","tagx"); t.textContent=s; f.appendChild(t); });
  b.appendChild(f); c.appendChild(b);
  return c;
}
function emptyState(){
  const d=el("div","state");
  d.innerHTML="<h3>Под этот срез товаров нет</h3><p>Измените аудиторию, направление или категорию — или добавьте товарам эти метки в PIM.</p>";
  return d;
}
function errorState(e){
  const d=el("div","state");
  d.innerHTML="<h3>Не удалось связаться с PIM</h3>"+
    "<p>Проверьте, что в <code>API_BASE</code> указан верный адрес и что на стороне PIM включён CORS для этого домена.</p>"+
    "<p style='margin-top:8px;font-size:12px'>"+esc(e.message)+" → "+esc(API_BASE)+"</p>";
  return d;
}

/* ---------- карточка товара (drawer) ---------- */
async function openProduct(slug){
  const dr=$("#drawer"), sc=$("#scrim");
  dr.innerHTML="<div class='dr-head'><button class='dr-close' onclick='closeDrawer()'>×</button></div><div class='dr-body'><div class='skel' style='height:200px'></div></div>";
  dr.classList.add("open"); sc.classList.add("open"); dr.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  try{
    const p = await fetchJSON(api("/api/products/"+slug+"/"));
    renderProduct(p);
  }catch(e){
    $(".dr-body",dr).innerHTML="<div class='state'><h3>Не удалось загрузить карточку</h3><p>"+esc(e.message)+"</p></div>";
  }
}
function closeDrawer(){
  $("#drawer").classList.remove("open"); $("#scrim").classList.remove("open");
  $("#drawer").setAttribute("aria-hidden","true"); document.body.style.overflow="";
}
function specValue(ch){
  let v=ch.value;
  if(Array.isArray(v)) v=v.join(", ");
  else if(v===true) v="Да"; else if(v===false) v="Нет";
  if(v===null||v===undefined||v==="") return "—";
  return esc(v)+(ch.unit? " "+esc(ch.unit):"");
}
function renderProduct(p){
  const general=(p.characteristics||[]).filter(c=>c.is_global);
  const cat=(p.characteristics||[]).filter(c=>!c.is_global);
  const imgs=p.images||[];
  const main = imgs[0] ? imgs[0].image : (p.thumbnail||null);

  let html="<div class='dr-head'><button class='dr-close' onclick='closeDrawer()'>×</button>";
  html+= p.brand && p.brand.name ? "<div class='kr2'>"+esc(p.brand.name)+"</div>" : "";
  html+= "<h2 class='dr-title'>"+esc(p.name)+"</h2>";
  html+= "<div class='dr-tags'>";
  (p.audiences||[]).forEach(a=> html+="<span class='tag2 aud'>"+esc(a.name)+"</span>");
  (p.directions||[]).forEach(d=> html+="<span class='tag2'>"+esc(d.name)+"</span>");
  html+="</div></div>";

  html+="<div class='dr-body'>";
  // галерея
  if(main){
    html+="<div class='dr-gallery'><div class='dr-main'><img id='drMain' src='"+esc(main)+"' alt='"+esc(p.name)+"'></div>";
    if(imgs.length>1){ html+="<div class='dr-thumbs'>"+imgs.map(im=>"<img src='"+esc(im.image)+"' alt='"+esc(im.alt||"")+"' onclick=\"document.getElementById('drMain').src=this.src\">").join("")+"</div>"; }
    html+="</div>";
  }
  if(p.short_description){ html+="<p style='color:var(--muted);margin:8px 0 0'>"+esc(p.short_description)+"</p>"; }

  // переключатель вариантов
  if(p.group && p.group.variants && p.group.variants.length>1){
    html+="<div class='section variants'><h3>Серия «"+esc(p.group.name)+"»</h3>";
    const levelName = (p.group.levels[0]||{}).name;
    const buckets={};
    p.group.variants.forEach(v=>{ const key=levelName? (v.levels[levelName]||"—") : "—"; (buckets[key]=buckets[key]||[]).push(v); });
    Object.keys(buckets).forEach(k=>{
      html+="<div class='grp'>";
      if(levelName && k!=="—") html+="<div class='glabel'>"+esc(levelName)+": "+esc(k)+"</div>";
      html+="<div class='vrow'>"+buckets[k].map(v=>
        "<button class='vbtn' aria-current='"+(v.is_current?"true":"false")+"' "+(v.is_current?"":"onclick=\"openProduct('"+esc(v.slug)+"')\"")+">"+esc(v.label)+"</button>"
      ).join("")+"</div></div>";
    });
    html+="</div>";
  }

  // ключевые идентификаторы (PIM-поля — моноширинным)
  const idRows=[];
  if(p.external_id) idRows.push(["Код (1С)", "<span class='mono'>"+esc(p.external_id)+"</span>"]);
  if(p.manufacturer_sku) idRows.push(["Артикул", "<span class='mono'>"+esc(p.manufacturer_sku)+"</span>"]);
  if(p.gtin) idRows.push(["Штрих-код (GTIN)", "<span class='mono'>"+esc(p.gtin)+"</span>"]);
  if(p.tnved_code) idRows.push(["Код ТН ВЭД", "<span class='mono'>"+esc(p.tnved_code)+"</span>"]);
  if(p.country_of_origin) idRows.push(["Страна", flag(p.country_of_origin.code)+" "+esc(p.country_of_origin.name)]);
  if(p.category && p.category.name) idRows.push(["Категория", esc(p.category.name)]);
  if(idRows.length){
    html+="<div class='section'><h3>Идентификация</h3><dl class='dl'>"+
      idRows.map(r=>"<dt>"+r[0]+"</dt><dd>"+r[1]+"</dd>").join("")+"</dl></div>";
  }

  // характеристики — общие и категорийные раздельно (как в PIM)
  if(general.length){
    html+="<div class='section'><h3>Общие характеристики</h3>"+
      general.map(c=>"<div class='spec'><span class='k'>"+esc(c.name)+"</span><span class='v'>"+specValue(c)+"</span></div>").join("")+"</div>";
  }
  if(cat.length){
    html+="<div class='section'><h3>Характеристики категории</h3>"+
      cat.map(c=>"<div class='spec'><span class='k'>"+esc(c.name)+"</span><span class='v'>"+specValue(c)+"</span></div>").join("")+"</div>";
  }

  // полное описание (HTML из TinyMCE — доверенный контент PIM)
  if(p.full_description){
    html+="<div class='section'><h3>Описание</h3><div class='rich'>"+p.full_description+"</div></div>";
  }

  // логистика
  const lg=p.logistics||{};
  if(lg.gross_width_mm||lg.gross_height_mm||lg.gross_depth_mm||lg.gross_weight_kg){
    html+="<div class='section'><h3>Логистика (брутто)</h3><dl class='dl'>";
    if(lg.gross_width_mm) html+="<dt>Ширина</dt><dd>"+esc(lg.gross_width_mm)+" мм</dd>";
    if(lg.gross_height_mm) html+="<dt>Высота</dt><dd>"+esc(lg.gross_height_mm)+" мм</dd>";
    if(lg.gross_depth_mm) html+="<dt>Глубина</dt><dd>"+esc(lg.gross_depth_mm)+" мм</dd>";
    if(lg.gross_weight_kg) html+="<dt>Масса</dt><dd>"+esc(lg.gross_weight_kg)+" кг</dd>";
    html+="</dl></div>";
  }

  // документы
  if(p.documents && p.documents.length){
    html+="<div class='section docs'><h3>Документы</h3>"+
      p.documents.map(d=>"<a href='"+esc(d.file)+"' target='_blank' rel='noopener'>📄 "+esc(d.name)+(d.number? " · "+esc(d.number):"")+"</a>").join("")+"</div>";
  }

  html+="</div>";
  $("#drawer").innerHTML=html;
}

$("#scrim").onclick=closeDrawer;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });
$("#more").onclick=()=>loadProducts(false);

/* ---------- старт ---------- */
(async function init(){
  try{
    await Promise.all([loadMenu(), loadTree()]);
  }catch(e){ /* меню/дерево могли не загрузиться — товары покажут ошибку сами */ }
  loadProducts(true);
})();
</script>
</body>
</html>
