name: Build & Deploy storefront

on:
  push:
    branches: [ main ]
  workflow_dispatch:            # ручной запуск кнопкой
  repository_dispatch:          # пересборка по событию из PIM
    types: [ rebuild ]
  schedule:
    - cron: "0 2 * * *"         # ночная пересборка как страховка (02:00 UTC)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Сборка статической витрины
        env:
          API_BASE: https://profisfera-pim.ru
          SITE_BASE: https://prigonskiy.github.io/profisfera-shop
        run: node build.mjs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
